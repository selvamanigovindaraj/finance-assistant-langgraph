name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install deps
        run: uv sync --dev

      - name: Download spaCy model
        run: uv run python -m spacy download en_core_web_lg --quiet

      - name: Lint
        run: uv run ruff check app tests

      - name: Type check
        run: uv run mypy app

      - name: Test
        run: uv run pytest --cov=app -q
        env:
          DEEPSEEK_API_KEY: placeholder
          DEEPSEEK_ENDPOINT: https://placeholder
          GROQ_API_KEY: placeholder
          REDIS_URL: redis://localhost:6379
