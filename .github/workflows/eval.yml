name: Eval

on:
  workflow_dispatch:
    inputs:
      category:
        description: "Category filter (leave blank for all)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - budgeting
          - expense_categorisation
          - stock_quote
          - financial_literacy
          - pii_detection
          - prompt_injection
      max_examples:
        description: "Max examples (leave blank for all)"
        required: false
        default: ""

jobs:
  eval:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install deps
        run: uv sync --dev

      - name: Download spaCy model
        run: uv run python -m spacy download en_core_web_lg --quiet

      - name: Run eval
        run: |
          ARGS="--eval-only"
          [ -n "$CATEGORY" ] && ARGS="$ARGS --category $CATEGORY"
          [ -n "$MAX_EXAMPLES" ] && ARGS="$ARGS --max-examples $MAX_EXAMPLES"
          uv run python scripts/eval.py $ARGS
        env:
          CATEGORY: ${{ inputs.category }}
          MAX_EXAMPLES: ${{ inputs.max_examples }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_ENDPOINT: ${{ secrets.DEEPSEEK_ENDPOINT }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          REDIS_URL: redis://localhost:6379
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
